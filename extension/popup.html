<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>AiKlavuz Günlük AI Asistanı</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- HEADER -->
    <header class="header">
      <div class="logo-wrapper">
        <svg class="logo-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="80" stroke="url(#logo-grad)" stroke-width="14" fill="none"/>
          <line x1="100" y1="35" x2="100" y2="165" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round"/>
          <line x1="35" y1="100" x2="165" y2="100" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round"/>
          <polygon points="100,50 85,100 100,150 115,100" fill="url(#needle-grad)"/>
          <circle cx="100" cy="100" r="10" fill="#ffffff"/>
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f2fe" />
              <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>
            <linearGradient id="needle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff4757" />
              <stop offset="100%" stop-color="#ff6b81" />
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text"><span class="logo-ai">Ai</span><span class="logo-klavuz">Klavuz</span></span>
      </div>
      <span class="badge-live">Canlı</span>
    </header>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-detect">Sitede Ne Var?</button>
      <button class="tab-btn" data-tab="tab-prompt">Günün Promptu</button>
      <button class="tab-btn" data-tab="tab-tools">Yeni Araçlar</button>
      <button class="tab-btn" data-tab="tab-news">AI Haberleri</button>
    </div>

    <!-- CONTENT PANEL -->
    <main class="content-panel">
      <!-- TAB 0: DETECT SITE -->
      <section id="tab-detect" class="tab-content active">
        <div id="detect-loading" class="spinner-wrapper"><div class="spinner"></div></div>
        
        <div id="detect-not-found" class="hidden" style="text-align:center; padding:24px 10px; color:var(--text-secondary); line-height:1.5;">
          <div style="font-size:1.8rem; margin-bottom:12px;">🔍</div>
          <p style="font-size:0.82rem; margin-bottom:14px;">Gezindiğiniz web sitesi henüz AiKlavuz'da listelenmemiş.</p>
          <a href="https://aiklavuz.com" target="_blank" class="btn-primary" style="display:inline-block; text-decoration:none; padding:8px 16px; color:#000;">Rehberde Arama Yap</a>
        </div>

        <div id="detect-content" class="hidden">
          <div style="background:rgba(0,242,254,0.05); border:1px solid rgba(0,242,254,0.15); padding:10px; border-radius:var(--radius-md); margin-bottom:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
              <h3 id="detect-tool-name" class="title" style="margin-bottom:0; font-size:0.95rem;">-</h3>
              <span id="detect-tool-rating" style="font-size:0.8rem; color:#f1c40f; font-weight:600;">★ -</span>
            </div>
            <p id="detect-tool-desc" style="font-size:0.78rem; color:var(--text-secondary); line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;"></p>
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span id="detect-tool-category" class="badge-category" style="margin-bottom:0;">-</span>
              <a id="detect-tool-link" href="#" target="_blank" style="font-size:0.74rem; color:var(--accent-cyan); font-weight:500; text-decoration:none;">Türkçe İncelemeyi Oku →</a>
            </div>
          </div>
          
          <h4 style="font-family:'Outfit',sans-serif; font-size:0.85rem; margin-bottom:8px; color:var(--text-primary);">💡 Ücretsiz / Benzer Alternatifleri</h4>
          <ul id="detect-alternatives-list" class="list-container"></ul>
        </div>
      </section>

      <!-- TAB 1: PROMPT OF THE DAY -->
      <section id="tab-prompt" class="tab-content">
        <div id="prompt-loading" class="spinner-wrapper"><div class="spinner"></div></div>
        <div id="prompt-content" class="hidden">
          <h3 id="prompt-title" class="title">-</h3>
          <span id="prompt-category" class="badge-category">-</span>
          <div class="prompt-text-box">
            <pre id="prompt-text">-</pre>
          </div>
          <button class="btn-primary" id="btn-copy-prompt">Promptu Kopyala 📋</button>
        </div>
      </section>

      <!-- TAB 2: NEW TOOLS -->
      <section id="tab-tools" class="tab-content">
        <div id="tools-loading" class="spinner-wrapper"><div class="spinner"></div></div>
        <ul id="tools-list" class="list-container hidden"></ul>
      </section>

      <!-- TAB 3: AI NEWS -->
      <section id="tab-news" class="tab-content">
        <div id="news-loading" class="spinner-wrapper"><div class="spinner"></div></div>
        <ul id="news-list" class="list-container hidden"></ul>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <a href="https://aiklavuz.com" target="_blank" class="btn-footer">AiKlavuz.com'a Git 🌐</a>
    </footer>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">Kopyalandı!</div>

  <script src="popup.js"></script>
</body>
</html>
